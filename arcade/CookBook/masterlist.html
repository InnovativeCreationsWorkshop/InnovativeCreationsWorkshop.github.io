<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palate Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gray:   #CDD7D8;
    --yellow: #FBD48F;
    --olive:  #BAAB46;
    --orange: #DE8948;
    --coral:  #E07A70;
    --dark:   #2f2f2f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--gray);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 3rem 2rem;
  }

  .page { max-width: 760px; margin: 0 auto; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(205,215,216,0.45);
    text-decoration: none;
    margin-bottom: 2.5rem;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--yellow); }

  .header {
    text-align: center;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid rgba(205,215,216,0.18);
    margin-bottom: 3rem;
  }

  .header-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--olive);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 10vw, 100px);
    letter-spacing: 0.08em;
    line-height: 0.9;
    color: var(--yellow);
  }

  .header-rule {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 1.5rem;
    justify-content: center;
  }

  .header-rule span {
    height: 1px;
    width: 80px;
    background: var(--coral);
    opacity: 0.5;
    display: block;
  }

  .header-rule i {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--coral);
    letter-spacing: 0.2em;
    opacity: 0.8;
  }

  .section { margin-bottom: 3.5rem; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .section-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--orange);
    opacity: 0.7;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 0.06em;
  }

  .section-title.salad  { color: var(--olive); }
  .section-title.soups  { color: var(--orange); }
  .section-title.rice   { color: var(--coral); }
  .section-title.dessert { color: var(--yellow); }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(205,215,216,0.2), transparent);
  }

  .items-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.45rem 1.5rem 0.45rem 0;
    border-bottom: 1px solid rgba(205,215,216,0.07);
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
  }

  .item:hover { background: rgba(255,255,255,0.03); }
  .item:hover .item-name { color: var(--yellow); }
  .item:hover .item-thumb { opacity: 1; }
  .item:hover .item-arrow { opacity: 0.6; }

  .item-thumb {
    flex-shrink: 0;
    width: 40px;
    height: 32px;
    object-fit: cover;
    border-radius: 4px;
    opacity: 0.75;
    transition: opacity 0.15s;
    background: rgba(205,215,216,0.08);
    display: block;
  }

  .item-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section:nth-child(2) .item-dot { background: var(--olive); }
  .section:nth-child(3) .item-dot { background: var(--orange); }
  .section:nth-child(4) .item-dot { background: var(--coral); }
  .section:nth-child(5) .item-dot { background: var(--yellow); }

  .item-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 400;
    color: var(--gray);
    line-height: 1.4;
    transition: color 0.15s;
    flex: 1;
    min-width: 0;
  }

  .item-arrow {
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
    color: var(--orange);
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
  }

  .footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(205,215,216,0.12);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-left {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(205,215,216,0.3);
    text-transform: uppercase;
  }

  .footer-badges { display: flex; gap: 0.75rem; }

  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
  }

  .badge-yellow { border: 1px solid rgba(251,212,143,0.4); color: var(--yellow); }
  .badge-coral  { border: 1px solid rgba(224,122,112,0.4); color: var(--coral); }
  .badge-olive  { border: 1px solid rgba(186,171,70,0.4);  color: var(--olive); }

  @media (max-width: 560px) {
    .items-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 56px; }
    .footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="page">

  <a class="back-btn" href="main.html">← BACK</a>

  <header class="header">
    <p class="header-label">RECIPE INDEX</p>
    <h1>PALATE MENU</h1>
    <div class="header-rule">
      <span></span>
      <i>world flavors</i>
      <span></span>
    </div>
  </header>

  <!-- JS builds all sections here -->
  <div id="recipe-list"></div>

  <footer class="footer">
    <span class="footer-left">Seasonal · Rotating · World Flavors</span>
    <div class="footer-badges">
      <span class="badge badge-olive">Vegetarian</span>
      <span class="badge badge-yellow">Chef's Pick</span>
      <span class="badge badge-coral">Spicy</span>
    </div>
  </footer>

</div>

<script src="Script\recipes.js"></script>
<script>

  // ── SECTION DEFINITIONS ───────────────────────────────
  // Only touch this if adding a whole new section to the masterlist

  const SECTIONS = [
    { number: '01', label: 'Salads',                 color: 'salad',   typeKey: 'salads'  },
    { number: '02', label: 'Soups, Stews & Curries', color: 'soups',   typeKey: 'soups'   },
    { number: '03', label: 'Rice, Noodles & Mains',  color: 'rice',    typeKey: 'carbs'   },
    { number: '04', label: 'Desserts',               color: 'dessert', typeKey: 'dessert' },
  ];

  // ── AUTO-BUILD ────────────────────────────────────────

  const container = document.getElementById('recipe-list');

  SECTIONS.forEach(sec => {
    const sectionRecipes = RECIPES.filter(r => {
      const t = r.categories.type;
      return Array.isArray(t) ? t.includes(sec.typeKey) : t === sec.typeKey;
    });

    if (sectionRecipes.length === 0) return; // skip empty sections

    const itemsHTML = sectionRecipes.map(r => `
      <a class="item" href="Recipes/${r.key}.html">
        <img class="item-thumb" src="${r.image ? r.image.replace('../', '') : 'Image/tempimage.jpg'}" onerror="this.src='Image/tempimage.jpg'" alt="${r.label}">
        <div class="item-dot"></div>
        <span class="item-name">${r.label}</span>
        <span class="item-arrow">→</span>
      </a>
    `).join('');

    container.innerHTML += `
      <section class="section">
        <div class="section-header">
          <span class="section-number">${sec.number}</span>
          <h2 class="section-title ${sec.color}">${sec.label}</h2>
          <div class="section-line"></div>
        </div>
        <div class="items-grid">${itemsHTML}</div>
      </section>
    `;
  });

</script>
</body>
</html>
