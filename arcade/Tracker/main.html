<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betty’s Life RPG</title>
<link rel="stylesheet" href="https://innovativecreationsworkshop.github.io/arcade/Tracker/style.css">
</head>

<body>
<div class="content-box">

<h1>Betty’s Life RPG</h1>

<!-- XP / Gold Display -->
<div class="stats">
  <h2 style="display:inline;">Daily XP:</h2>
  <div id="xpResult" style="display:inline; margin-right:40px;">0</div>

  <h2 style="display:inline;">Weekly XP:</h2>
  <div id="weeklyXpResult" style="display:inline; margin-right:40px;">0</div>

  <h2 style="display:inline;">Gold:</h2>
  <div id="goldResult" style="display:inline;">0</div>
</div>

<!-- XP Progress / Conversion -->
<h3>XP Progress to Gold</h3>
<progress id="xpProgressBar" value="0" max="500" style="width:100%; height:20px;"></progress>
<p>
  <span id="xpProgressText">0 / 500 XP</span>
</p>
<button type="button" id="convertGoldBtn">Convert XP to Gold</button>

<hr>

<!-- Daily Movement -->
<h2>Daily Movement</h2>
<button type="button" id="movementDoneBtn">Set New Goal</button>
<p>Move Goal: <span id="movementGoalDisplay">Not Set</span></p>

<input type="number" id="extraMovementInput" placeholder="Enter minutes" min="0">
<button type="button" id="logExtraMovementBtn">Log Movement</button>
<p id="extraMovementOutput"></p>

<hr>

<!-- Food Section -->
<h2>Food</h2>
<button type="button" id="addProteinBtn">+20 Protein</button>
<span id="proteinCount">0</span>
<br><br>
<button type="button" id="addvegBtn">+10 Fruit / Veggies</button>
<span id="vegCount">0</span>

<hr>

<!-- Hydration Section -->
<h2>Hydration</h2>
<button type="button" id="addHydrationBtn">+2 Drink water / tea</button>
<span id="hydrationCount">0</span>
<br><br>
<button type="button" id="addwarmBtn">+2 Bonus Warm Water</button>
<span id="warmCount">0</span>

<hr>

<!-- Glucose Section -->
<h2>Glucose Check</h2>
<p>Glucose value (mg/dL):</p>
<input type="number" id="glucoseInput" placeholder="Enter glucose">
<br><br>
<label><input type="checkbox" id="fastingCheck"> Fasting</label>
<label><input type="checkbox" id="postMealCheck"> Post-meal</label>
<br><br>
<button type="button" id="logGlucoseBtn">Log Glucose</button>
<p id="glucoseOutput"></p>

<hr>

<!-- Day Controls -->
<h2>Day Controls</h2>
<button type="button" id="lockInBtn">Lock In Today</button>
<button type="button" id="clearTodayBtn">Clear Today</button>
<button type="button" id="clearAllBtn">Reset All</button>

</div>

<!-- SCRIPT AT BOTTOM -->
<script src="script.js"></script>

</body>
</html>
